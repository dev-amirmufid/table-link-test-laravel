services:
  # Laravel Application
  app:
    build:
      context: .
      dockerfile: docker/local/Dockerfile
    container_name: tablelink-app
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=tablelink
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - mysql
    networks:
      - tablelink-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: tablelink-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=tablelink
      - MYSQL_USER=tablelink
      - MYSQL_PASSWORD=tablelink
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/local.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - tablelink-network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: tablelink-nginx
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/local.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html/public
    depends_on:
      - app
    networks:
      - tablelink-network

volumes:
  mysql-data:

networks:
  tablelink-network:
    driver: bridge
